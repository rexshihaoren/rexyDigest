name: Weekly Gist
on:
  schedule:
    - cron: "0 1 * * 0" # every Sunday 09:00 SGT (01:00 UTC)
  workflow_dispatch:
    inputs:
      end_date:
        description: "Window end date YYYY-MM-DD; default is today's UTC date"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Resolve window end
        env:
          END_DATE_INPUT: ${{ inputs.end_date }}
        run: |
          if [ -n "$END_DATE_INPUT" ]; then
            END_DATE="$END_DATE_INPUT"
          else
            END_DATE="$(date -u +%F)"
          fi
          echo "END_DATE=$END_DATE" >> "$GITHUB_ENV"
          echo "Using END_DATE=$END_DATE"

      - name: Ingest sources
        run: PYTHONPATH=python python -m rexy ingest --end "$END_DATE"

      - name: Generate weekly gist
        run: PYTHONPATH=python python -m rexy generate --end "$END_DATE" --llm gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Publish public brief
        run: PYTHONPATH=python python -m rexy publish --end "$END_DATE"

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f "Weekly_Gist/Weekly_Gist_${END_DATE}.md" "Weekly_Gist/Public/Weekly_Brief_Public_${END_DATE}.md"
          git commit -m "chore: weekly gist ${END_DATE}" || echo "no changes"
          git push
